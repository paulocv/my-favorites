---
layout: default
---

<article class="pick">
  <header class="page-header">
    <p class="eyebrow">Favorite Pick</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="lede">{{ page.summary }}</p>
    {% endif %}
    {% if page.tags and page.tags.size > 0 %}
      <ul class="tag-list" aria-label="Tags">
        {% for tag in page.tags %}
          <li>{{ tag }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content }}
  </div>

  <p><a href="{{ '/' | relative_url }}">Back to all picks</a></p>
</article>
