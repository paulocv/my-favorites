{{ define "main" }}
  <article class="page">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="lede">{{ . }}</p>
      {{ end }}
    </header>

    <div class="page-content">
      {{ .Content }}
      {{ if eq .Section "picks" }}
        {{ partial "toc.html" . }}
      {{ end }}
    </div>
  </article>
{{ end }}
