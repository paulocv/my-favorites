<!doctype html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="wrap">
          <p class="site-title"><a href="{{ .Site.BaseURL | relURL }}">{{ .Site.Title }}</a></p>
          {{ partial "nav.html" . }}
        </div>
      </header>

      <main class="site-main">
        <div class="wrap">
          {{ block "main" . }}{{ end }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="wrap">
          <p>Built with Hugo and GitHub Pages.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
