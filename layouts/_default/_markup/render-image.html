{{- $src := .Destination -}}
{{- if hasPrefix $src "/" -}}
  {{- $src = printf "%s%s" site.BaseURL (strings.TrimPrefix "/" $src) -}}
{{- end -}}
<img src="{{ $src | safeURL }}"
  {{- with .PlainText }} alt="{{ . }}"{{ end -}}
  {{- with .Title }} title="{{ . }}"{{ end -}}
>
{{- /* chomp trailing newline */ -}}
